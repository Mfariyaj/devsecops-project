apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: main
    path: k8s-manifests/base
  destination:
    server: https://kubernetes.default.svc
    namespace: devsecops-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
