# ============================================
# ArgoCD: App-of-Apps Pattern
# This root app deploys ALL child applications
# ============================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/devsecops-project.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
