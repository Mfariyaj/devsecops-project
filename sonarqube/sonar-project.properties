# ============================================
# SonarQube Project Configuration
# Production-level analysis settings
# ============================================
sonar.projectKey=devsecops-user-service
sonar.projectName=User Service
sonar.projectVersion=1.0

# Source configuration
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,dist/**,*.test.js,*.spec.js
sonar.tests=.
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage report (from Jest/Istanbul)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate thresholds (will block pipeline if failed)
# Conditions:
#   - Coverage < 80% → FAIL
#   - Duplicated Lines > 3% → FAIL
#   - Maintainability Rating > A → FAIL
#   - Reliability Rating > A → FAIL
#   - Security Rating > A → FAIL
#   - Security Hotspots Reviewed < 100% → FAIL

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Security: Detect vulnerabilities
sonar.security.sources.javasecurity.vulnerabilities.disabled=false
