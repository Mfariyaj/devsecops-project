# ============================================
# ConfigMaps: Application Configuration
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devsecops-apps
data:
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW: "60000"
  CORS_ORIGIN: "https://app.devsecops.local"
  SERVICE_MESH_ENABLED: "true"
---
# Per-service config
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: devsecops-apps
data:
  UPSTREAM_TIMEOUT: "30000"
  RETRY_COUNT: "3"
  CIRCUIT_BREAKER_THRESHOLD: "5"
  services.json: |
    {
      "user-service": {"host": "user-service", "port": 3001},
      "product-service": {"host": "product-service", "port": 3002},
      "order-service": {"host": "order-service", "port": 3003},
      "payment-service": {"host": "payment-service", "port": 3004},
      "cart-service": {"host": "cart-service", "port": 3005}
    }
---
# ============================================
# Secrets: Sensitive Data (base64 encoded)
