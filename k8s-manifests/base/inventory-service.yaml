apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: devsecops-apps
  labels:
    app: inventory-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
    spec:
      containers:
      - name: inventory-service
        image: inventory-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3007
        env:
        - name: PORT
          value: "3007"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: devsecops-apps
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
  - port: 3007
    targetPort: 3007
    protocol: TCP
  type: ClusterIP
