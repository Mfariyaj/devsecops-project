# ============================================
# Prometheus Alerting Rules (Production)
# ============================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devsecops-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: microservices.rules
    rules:
    # Alert: Pod is down
    - alert: PodDown
      expr: up{namespace="devsecops-apps"} == 0
      for: 1m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Pod {{ $labels.pod }} is DOWN"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been down for 1 minute."

    # Alert: High CPU usage (>80%)
    - alert: HighCPUUsage
      expr: |
        (sum(rate(container_cpu_usage_seconds_total{namespace="devsecops-apps"}[5m])) by (pod)
        / sum(kube_pod_container_resource_limits{resource="cpu",namespace="devsecops-apps"}) by (pod)) > 0.8
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High CPU usage on {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} CPU usage is above 80% for 5 minutes."

    # Alert: High Memory usage (>85%)
    - alert: HighMemoryUsage
      expr: |
        (container_memory_working_set_bytes{namespace="devsecops-apps"}
        / container_spec_memory_limit_bytes{namespace="devsecops-apps"}) > 0.85
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High memory on {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} memory usage is above 85%."

    # Alert: High error rate (>5% 5xx)
    - alert: HighErrorRate
      expr: |
        sum(rate(http_requests_total{status=~"5..",namespace="devsecops-apps"}[5m])) by (service)
        / sum(rate(http_requests_total{namespace="devsecops-apps"}[5m])) by (service) > 0.05
      for: 2m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "High error rate on {{ $labels.service }}"
        description: "Service {{ $labels.service }} has >5% error rate."

    # Alert: Pod restart loop
    - alert: PodRestartLoop
      expr: increase(kube_pod_container_status_restarts_total{namespace="devsecops-apps"}[1h]) > 3
      for: 5m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Pod {{ $labels.pod }} restarting frequently"
        description: "Pod {{ $labels.pod }} has restarted more than 3 times in the last hour."

    # Alert: Deployment replicas mismatch
    - alert: DeploymentReplicasMismatch
      expr: |
        kube_deployment_spec_replicas{namespace="devsecops-apps"}
        != kube_deployment_status_available_replicas{namespace="devsecops-apps"}
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Deployment {{ $labels.deployment }} replicas mismatch"
        description: "Deployment {{ $labels.deployment }} has unavailable replicas."

  - name: infrastructure.rules
    rules:
    # Alert: Node disk almost full
    - alert: NodeDiskAlmostFull
      expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node disk almost full"
        description: "Node {{ $labels.instance }} has less than 10% disk space remaining."

    # Alert: Certificate expiring soon
    - alert: CertificateExpiringSoon
      expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 604800
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Certificate expiring within 7 days"
